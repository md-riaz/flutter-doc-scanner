name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string
        default: 'Manual release'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'

    - name: Get dependencies
      run: flutter pub get

    - name: Generate code
      run: dart run build_runner build --delete-conflicting-outputs

    - name: Update version in pubspec.yaml
      run: |
        VERSION="${{ github.event.inputs.version }}"
        BUILD_NUMBER=${{ github.run_number }}
        sed -i "s/^version:.*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
        echo "Updated version to ${VERSION}+${BUILD_NUMBER}"

    - name: Build Release APK
      run: flutter build apk --release

    - name: Rename APK
      run: |
        VERSION="${{ github.event.inputs.version }}"
        cp build/app/outputs/flutter-apk/app-release.apk \
           build/app/outputs/flutter-apk/doc-scanner-v${VERSION}.apk

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.event.inputs.version }}
        release_name: Release v${{ github.event.inputs.version }}
        body: |
          ${{ github.event.inputs.release_notes }}

          ## Download
          Download the APK below to install on your Android device.

          ## Installation
          1. Download the APK file
          2. Enable "Install from Unknown Sources" in your Android settings
          3. Open the downloaded APK file to install

          ## Build Information
          - Version: ${{ github.event.inputs.version }}
          - Build Number: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
          - Build Date: ${{ github.event.repository.updated_at }}
        draft: false
        prerelease: false

    - name: Upload Release APK
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: build/app/outputs/flutter-apk/doc-scanner-v${{ github.event.inputs.version }}.apk
        asset_name: doc-scanner-v${{ github.event.inputs.version }}.apk
        asset_content_type: application/vnd.android.package-archive

    - name: Upload APK artifact (backup)
      uses: actions/upload-artifact@v4
      with:
        name: release-apk-v${{ github.event.inputs.version }}
        path: build/app/outputs/flutter-apk/doc-scanner-v${{ github.event.inputs.version }}.apk
        retention-days: 90
