name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string
        default: 'Manual release'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Platform 36
      run: |
        sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4' # Matched with flutter-ci.yml
        channel: 'stable'

    - name: Get dependencies
      run: flutter pub get

    - name: Generate code
      run: dart run build_runner build --delete-conflicting-outputs

    - name: Update version in pubspec.yaml
      run: |
        VERSION="${{ github.event.inputs.version }}"
        BUILD_NUMBER=${{ github.run_number }}
        sed -i "s/^version:.*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
        echo "Updated version to ${VERSION}+${BUILD_NUMBER}"

    - name: Build Release APK
      run: flutter build apk --release --no-pub

    - name: Rename APK
      run: |
        VERSION="${{ github.event.inputs.version }}"
        mkdir -p build/app/outputs/flutter-apk/
        cp build/app/outputs/flutter-apk/app-release.apk \
           build/app/outputs/flutter-apk/doc-scanner-v${VERSION}.apk

    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Release v${{ github.event.inputs.version }}
        body: |
          ${{ github.event.inputs.release_notes }}

          ## Download
          Download the APK below to install on your Android device.

          ## Installation
          1. Download the APK file
          2. Enable "Install from Unknown Sources" in your Android settings
          3. Open the downloaded APK file to install

          ## Build Information
          - Version: ${{ github.event.inputs.version }}
          - Build Number: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
          - Build Date: ${{ github.event.repository.updated_at }}
        files: |
          build/app/outputs/flutter-apk/doc-scanner-v${{ github.event.inputs.version }}.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload APK artifact (backup)
      uses: actions/upload-artifact@v4
      with:
        name: release-apk-v${{ github.event.inputs.version }}
        path: build/app/outputs/flutter-apk/doc-scanner-v${{ github.event.inputs.version }}.apk
        retention-days: 90
