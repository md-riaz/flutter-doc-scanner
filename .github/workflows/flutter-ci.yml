name: Flutter CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Platform 36
      run: |
        sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

    - name: Make gradlew executable
      run: chmod +x ./android/gradlew

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        cache: false

    - name: Create android/local.properties for CI
      run: |
        mkdir -p android
        echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

    - name: Remove generated local Flutter metadata
      run: |
        rm -rf .dart_tool
        rm -f .flutter-plugins .flutter-plugins-dependencies

    - name: Flutter clean
      run: flutter clean

    - name: Clean Gradle cache
      run: |
        cd android
        ./gradlew clean --no-daemon --stacktrace --info
        cd ..

    - name: Get dependencies
      run: flutter pub get

    - name: Generate code
      run: dart run build_runner build --delete-conflicting-outputs

    - name: Analyze code
      run: flutter analyze

    - name: Run tests
      run: |
        if [ -d "test" ]; then
          flutter test
        else
          echo "No test directory found, skipping tests"
        fi

    - name: Build APK
      run: flutter build apk --debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: build/app/outputs/flutter-apk/app-debug.apk

  # Optional: Build for web
  build-web:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'

    - name: Get dependencies
      run: flutter pub get

    - name: Generate code
      run: dart run build_runner build --delete-conflicting-outputs

    - name: Build web
      run: |
        if [ -d "web" ]; then
          flutter build web
        else
          echo "No web directory found, skipping web build"
        fi

    - name: Upload web artifact
      if: hashFiles('web/index.html') != ''
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: build/web/
