name: doc_scanner
description: Android-first Flutter application for document scanning, PDF generation, secure cloud upload, document management, and workflow integration.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^12.1.3

  # Networking
  dio: ^5.4.0

  # Local Storage
  flutter_secure_storage: ^9.0.0
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # Camera & Image Processing
  camera: ^0.10.5+7
  image: ^4.1.3

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.11.1

  # Connectivity
  connectivity_plus: ^5.0.2

  # Background Work
  workmanager: ^0.5.2

  # Biometric Authentication (Optional)
  local_auth: ^2.1.8

  # File Handling
  open_filex: ^4.3.4
  share_plus: ^7.2.1
  permission_handler: ^11.1.0

  # UI Components
  cupertino_icons: ^1.0.6

  # Utilities
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  drift_dev: ^2.14.1

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
