buildscript {
    ext.kotlin_version = '1.9.0'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.3'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'

// Flutter SDK extension configuration for plugins
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"

    // Create flutter extension object for plugins to access flutter.* properties
    // Do not apply this to :app as it would shadow the FlutterExtension from dev.flutter.flutter-gradle-plugin
    if (project.name != 'app') {
        project.ext.flutter = [
            compileSdkVersion: 34,
            minSdkVersion    : 21,
            targetSdkVersion : 34,
            ndkVersion       : "",
            buildToolsVersion: "34.0.0"
        ]
    }

    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                // Ensure compileSdkVersion is set for all plugins
                if (!project.android.hasProperty('compileSdkVersion') || project.android.compileSdkVersion == null) {
                    compileSdkVersion 34
                }

                // Provide default build configuration
                if (!project.android.hasProperty('buildToolsVersion') || project.android.buildToolsVersion == null) {
                    buildToolsVersion "34.0.0"
                }
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
